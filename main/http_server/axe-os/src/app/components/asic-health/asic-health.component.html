<ng-container *ngIf="info$ | async as info">
    <div class="grid">
        <div class="col-12">
            <h2><i class="pi pi-heartbeat text-red-500 mr-2"></i>ASIC Health</h2>
        </div>

        <!-- ASIC Health Grid -->
        <ng-container *ngFor="let asic of asicHealthList; let i = index">
            <div class="col-12 sm:col-6 md:col-4 lg:col-3">
                <div class="card asic-health-card mb-0" [ngClass]="'border-' + (asic.status === 'good' ? 'green' : asic.status === 'warning' ? 'yellow' : 'red') + '-500'">
                    <!-- ASIC Index -->
                    <div class="text-center mb-3">
                        <p class="text-600 text-sm mb-1">ASIC {{ asic.asicIndex + 1 }}</p>
                        
                        <!-- Health Percentage with Icon -->
                        <div class="flex justify-content-center align-items-center gap-2">
                            <span class="text-3xl font-bold" [ngClass]="getStatusColor(asic.status)">
                                {{ asic.healthPercentage }}%
                            </span>
                            <i class="pi text-2xl" 
                               [ngClass]="getStatusIcon(asic.status)" 
                               [ngClass]="getStatusColor(asic.status)"></i>
                        </div>

                        <!-- Additional Info (Smaller Text) -->
                        <p class="text-xs text-500 mt-2 mb-0">
                            Error: {{ asic.errorPercentage }}%
                        </p>

                        <!-- Test Button -->
                        <p-button 
                            label="Test Chip" 
                            icon="pi pi-chart-line" 
                            (onClick)="toggleChart(i)" 
                            styleClass="p-button-sm p-button-outlined mt-2">
                        </p-button>
                    </div>

                    <!-- Chart -->
                    <div *ngIf="showChart[i]" class="mt-3">
                        <p-chart 
                            type="doughnut" 
                            [data]="getChartData(asic)" 
                            [options]="getChartOptions()" 
                            height="200px">
                        </p-chart>
                    </div>
                </div>
            </div>
        </ng-container>
    </div>

</ng-container>
